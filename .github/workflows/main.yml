name: Auto Run Fast Debug

on:
  workflow_dispatch:
  schedule:
    - cron: '6 7,19 * * *'

permissions:
  contents: write

concurrency:
  group: fast-debug-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  run-fast-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Checkout 私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          fetch-depth: 1

      - name: 📂 准备脚本与依赖
        run: |
          set -Eeuo pipefail

          test -f private/main.py || { echo "private/main.py 不存在"; exit 1; }
          cp private/main.py main.py

          if [[ -f private/requirements.txt ]]; then
            cp private/requirements.txt requirements.txt
          fi

          test -f requirements.txt || { echo "requirements.txt 不存在"; exit 1; }

          mkdir -p state debug
          ls -lah
          ls -lah private

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 📦 安装依赖
        run: |
          set -Eeuo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            chromium-browser \
            ca-certificates \
            curl \
            gnupg \
            lsb-release

          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: 🌐 安装并连接 WARP
        run: |
          set -Eeuo pipefail

          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list > /dev/null

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

          warp-cli --accept-tos registration new || true
          warp-cli --accept-tos mode warp || true
          warp-cli --accept-tos connect || true

          for i in {1..6}; do
            status="$(warp-cli --accept-tos status 2>/dev/null || true)"
            echo "[$i/6] $status"
            if echo "$status" | grep -qi "Connected"; then
              break
            fi
            sleep 2
          done

          warp-cli --accept-tos status || true

      - name: ▶️ 运行抓请求调试脚本
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -Eeuo pipefail
          xvfb-run -a python main.py 2>&1 | tee run.log

      - name: 📄 检查输出
        if: always()
        run: |
          echo "==== runtime_state.json ===="
          cat runtime_state.json || true

          echo "==== network_log.json ===="
          cat network_log.json || true

          echo "==== run.log 最后 200 行 ===="
          tail -n 200 run.log || true

          echo "==== debug 目录 ===="
          ls -lah debug || true

      - name: 🗂️ 保存状态文件
        if: always()
        run: |
          set -Eeuo pipefail

          mkdir -p state

          [[ -f runtime_state.json ]] && cp runtime_state.json state/runtime_state.json || true
          [[ -f network_log.json ]] && cp network_log.json state/network_log.json || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state/runtime_state.json state/network_log.json || true

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
            exit 0
          fi

          git commit -m "chore: update debug state"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: 📤 上传产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-debug-${{ github.run_number }}
          retention-days: 7
          if-no-files-found: warn
          path: |
            runtime_state.json
            network_log.json
            state/runtime_state.json
            state/network_log.json
            run.log
            debug/**
