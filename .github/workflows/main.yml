name: Auto Run

on:
  schedule:
    - cron: '6 7,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-addtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1) Checkout 当前仓库（后续 runtime_state.json 会提交回这里）
      - name: 📥 Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Checkout 私库，只取脚本来源，不回写私库
      - name: 📥 Checkout 私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      # 3) 使用私库里的 main.py 作为实际执行脚本
      - name: 📂 复制私库脚本到当前仓库工作目录
        run: |
          cp private/main.py main.py
          ls -lah

      # 4) Python
      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 5) 依赖与系统组件
      - name: 📦 安装 Python 依赖及系统组件
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install DrissionPage requests DataRecorder DownloadKit FlowViewer lxml websocket-client psutil

          sudo apt-get update
          sudo apt-get install -y xvfb

      # 6) 安装 WARP
      - name: 🌐 安装并配置 Cloudflare WARP CLI
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect

          sleep 5
          echo "WARP 初始化完成"

      # 7) 运行前环境检查
      - name: 🔎 检查运行环境
        run: |
          python --version
          which python
          which google-chrome || true
          which chromium || true
          which chromium-browser || true
          warp-cli --accept-tos status || true

      # 8) 运行脚本并保存日志
      - name: ▶️ 运行续期脚本
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -o pipefail
          xvfb-run -a python main.py | tee run.log

      # 9) 查看结果
      - name: 📄 检查结果文件
        if: always()
        run: |
          echo "==== 当前目录文件 ===="
          ls -lah
          echo "==== runtime_state.json ===="
          cat runtime_state.json || true
          echo "==== run.log 最后 100 行 ===="
          tail -n 100 run.log || true

      # 10) 回写到当前仓库
      - name: 🗂️ 回写 runtime_state.json 到当前仓库
        if: always()
        run: |
          if [ ! -f runtime_state.json ]; then
            echo "runtime_state.json 不存在，跳过提交"
            exit 0
          fi

          mkdir -p state
          cp runtime_state.json state/runtime_state.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state/runtime_state.json

          if git diff --cached --quiet; then
            echo "state/runtime_state.json 无变化，无需提交"
            exit 0
          fi

          git commit -m "chore: update runtime state"
          git push

      # 11) 上传产物，便于调试和留档
      - name: 📤 上传运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-state-${{ github.run_number }}
          retention-days: 15
          path: |
            runtime_state.json
            state/runtime_state.json
            run.log
          if-no-files-found: warn

      - name: 📤 上传调试文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files-${{ github.run_number }}
          retention-days: 7
          path: |
            debug/**
          if-no-files-found: ignore
