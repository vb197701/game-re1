name: Auto Run

on:
  schedule:
    - cron: '6 7,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-run-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  run-addtime:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: 📥 Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Checkout 私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          fetch-depth: 1

      - name: 📂 准备脚本与依赖
        run: |
          set -Eeuo pipefail

          test -f private/main.py || { echo "private/main.py 不存在"; exit 1; }
          cp private/main.py main.py

          if [[ -f private/requirements.txt ]]; then
            cp private/requirements.txt requirements.txt
          fi

          test -f requirements.txt || { echo "requirements.txt 不存在"; exit 1; }

          mkdir -p state debug

          echo "==== workspace ===="
          ls -lah
          echo "==== private ===="
          ls -lah private

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 📦 安装系统依赖与 Python 依赖
        run: |
          set -Eeuo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            chromium-browser \
            ca-certificates \
            curl \
            gnupg \
            lsb-release

          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: 🌐 安装并初始化 Cloudflare WARP
        run: |
          set -Eeuo pipefail

          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list > /dev/null

          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

          warp-cli --accept-tos registration new || true
          warp-cli --accept-tos mode warp || true
          warp-cli --accept-tos connect || true

          echo "等待 WARP 连接..."
          for i in {1..12}; do
            status="$(warp-cli --accept-tos status 2>/dev/null || true)"
            echo "[$i/12] $status"
            if echo "$status" | grep -qi "Connected"; then
              echo "WARP 已连接"
              break
            fi
            sleep 3
          done

          warp-cli --accept-tos status || true

      - name: 🔎 环境检查
        run: |
          set -Eeuo pipefail

          python --version
          which python
          which xvfb-run
          which xauth
          which chromium-browser || true
          which chromium || true
          which google-chrome || true

          echo "==== WARP 状态 ===="
          warp-cli --accept-tos status || true

      - name: ▶️ 运行续期脚本
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -Eeuo pipefail
          xvfb-run -a python main.py 2>&1 | tee run.log

      - name: 📄 检查结果文件
        if: always()
        run: |
          echo "==== 当前目录文件 ===="
          ls -lah

          echo "==== runtime_state.json ===="
          cat runtime_state.json || true

          echo "==== state/runtime_state.json ===="
          cat state/runtime_state.json || true

          echo "==== run.log 最后 150 行 ===="
          tail -n 150 run.log || true

          echo "==== debug 目录 ===="
          ls -lah debug || true

      - name: 🗂️ 保存并提交 runtime_state.json
        if: always()
        run: |
          set -Eeuo pipefail

          if [[ ! -f runtime_state.json ]]; then
            echo "runtime_state.json 不存在，跳过提交"
            exit 0
          fi

          mkdir -p state
          cp runtime_state.json state/runtime_state.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state/runtime_state.json

          if git diff --cached --quiet; then
            echo "state/runtime_state.json 无变化，无需提交"
            exit 0
          fi

          git commit -m "chore: update runtime state"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: 📤 上传运行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-state-${{ github.run_number }}
          retention-days: 15
          if-no-files-found: warn
          path: |
            runtime_state.json
            state/runtime_state.json
            run.log

      - name: 📤 上传调试文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files-${{ github.run_number }}
          retention-days: 7
          if-no-files-found: ignore
          path: |
            debug/**
